    <script>

       // console.log("Hello, World!")
         let rock = 0;
        let paper = 0;
        let scissors = 0;



        function getComputerChoice()
        {
            let i = Math.floor(Math.random() * 3);
            if(i === 0)
              {
                rock++;
                return "rock";
              }
              else if(i === 1){
                paper++;
                return "paper";
              }
              else{
                scissors++;
                return "scissors";
              }
        }
        function getHumanChoice(){
            prompt("Please enter either 'rock', 'paper', or 'scissors': ");
