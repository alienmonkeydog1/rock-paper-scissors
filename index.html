    <title>Rock Paper Scissors Game</title>
</head>
<body>
    
    <script>

       // console.log("Hello, World!")
         let rock = 0;
        let paper = 0;
        let scissors = 0;

        let humanScore = 0;
        let computerScore = 0;
        let ties = 0;


        function getComputerChoice()
        {
            let i = Math.floor(Math.random() * 3);
            if(i === 0)
              {
                rock++;
                return "rock";
              }
              else if(i === 1){
                paper++;
                return "paper";
              }
              else{
                scissors++;
                return "scissors";
              }
        }
        function getHumanChoice(){
          let value =  prompt("Please enter either 'rock', 'paper', or 'scissors': ");
            return value;
        }

        //const humanSelection = getHumanChoice();
       // const computerSelection = getComputerChoice();

        function playRound(humanChoice, computerChoice){
            let x = humanChoice.toLowerCase();
            if(x === computerChoice){
                ties++;
                console.log("It's a tie! " + humanChoice + " is the same as " + computerChoice + ".");
            }
            else if(x === "rock"){
                if(computerChoice === "scissors"){
                    humanScore++;
                    console.log("You win! " + humanChoice + " beats " + computerChoice + ".");
                }
                else{
                    computerScore++;
                    console.log("You lose! " + computerChoice + " beats " + humanChoice + ".")
                }
            }
             else if(x === "scissors"){
                if(computerChoice === "paper"){
                    humanScore++;
                    console.log("You win! " + humanChoice + " beats " + computerChoice + ".");
                }
                else{
                    computerScore++;
                    console.log("You lose! " + computerChoice + " beats " + humanChoice + ".")
                }
            }
             else if(x === "paper"){
                if(computerChoice === "rock"){
                    humanScore++;
                    console.log("You win! " + humanChoice + " beats " + computerChoice + ".");
                }
                else{
                    computerScore++;
                    console.log("You lose! " + computerChoice + " beats " + humanChoice + ".")
                }
            }
        }
       
        function playGame(){
            for(i = 0; i < 5; i++){
                let humanSelection = getHumanChoice();
                let computerSelection =  getComputerChoice();
                playRound(humanSelection, computerSelection);
             }
             console.log("The final score is Player: " + humanScore + " Computer: " + computerScore + ".");
             if(humanScore > computerScore){
                console.log("You Won the Game!");
             }
             else if(computerScore > humanScore){
                console.log("The Computer Wins the Game!");
             }
             else{
                console.log("The Game is a tie!");
             }
        }
